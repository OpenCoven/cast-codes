# Manual CastCodes OSS release dry-run wrapper.
#
# The public fork publishes OSS releases through Create Release. Scheduled
# upstream channel cuts are intentionally disabled here because non-OSS
# channels are not public-fork release targets.

name: Cut New Releases
on:
  workflow_dispatch:
    inputs:
      channel:
        type: choice
        description: Which CastCodes release channel to dry-run.
        default: oss
        options:
          - oss

env:
  CONFIG_FILE: ".github/workflows/release_configurations.json"

jobs:
  get_config:
    name: Get release configuration
    runs-on: ubuntu-latest
    env:
      CHANNEL: ${{ inputs.channel || 'oss' }}
    outputs:
      channels: ${{ steps.get-config.outputs.channels }}
    steps:
      - name: Check for default branch
        run: |
          [ "$GITHUB_REF" == "refs/heads/$DEFAULT_BRANCH" ] || (echo "::error::Can only cut new releases on the default branch ($DEFAULT_BRANCH)" && exit 1)
        shell: bash
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: get-config
        run: |
          set -euo pipefail

          jq -e --arg channel "$CHANNEL" \
            '.channels[] | select(.channel == $channel)' \
            "$CONFIG_FILE" >/dev/null

          echo "channels=[\"$CHANNEL\"]" >> "$GITHUB_OUTPUT"
        shell: bash

  create_release:
    name: Create Release
    uses: ./.github/workflows/create_release.yml
    needs: get_config
    permissions:
      contents: write
      id-token: write
      attestations: write
    strategy:
      fail-fast: false
      matrix:
        channel: ${{ fromJSON(needs.get_config.outputs.channels) }}
    with:
      channel: ${{ matrix.channel }}
    secrets: inherit
